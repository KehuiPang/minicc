<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2521"/>
      <stop offset="1" stop-color="#17130f"/>
    </linearGradient>
    <linearGradient id="spark" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#f2a684"/>
      <stop offset="0.55" stop-color="#d97757"/>
      <stop offset="1" stop-color="#c15f3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d97757" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle 背景：只占中间 824×824，四周约 100px 透明（与其他 app 一致大小） -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="300" fill="url(#glow)"/>

  <!-- 主 sparkle：放大填满、更饱满 -->
  <path d="M512 262
           Q567 457 567 457
           Q567 457 762 512
           Q567 567 567 567
           Q567 567 512 762
           Q457 567 457 567
           Q457 567 262 512
           Q457 457 457 457
           Q457 457 512 262 Z"
        fill="url(#spark)"/>

  <!-- 次级小 sparkle（右上） -->
  <path d="M695 245
           Q716 322 716 322
           Q716 322 793 343
           Q716 364 716 364
           Q716 364 695 441
           Q674 364 674 364
           Q674 364 597 343
           Q674 322 674 322
           Q674 322 695 245 Z"
        fill="#e8926f" opacity="0.92"/>
</svg>
